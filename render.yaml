services:
  - type: web
    name: ai-atlas-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-3.1-flash-lite
      - key: LLM_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GNEWS_API_KEY
        sync: false
      - key: NEWS_SCHEDULER_ENABLED
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
